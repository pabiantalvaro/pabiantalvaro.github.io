<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productivity Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <aside>
    <div class="date-header" id="current-date">
      Loading Date...
    </div>

    <div class="routines">
        <h2>Workout Routines</h2>
      <div class="routines-container" id="workout-container">
      </div>
    </div>
    
    <div class="sidebar-section">
      <h2>Schedule</h2>
      <div class="timeline" id="timeline">
        </div>
    </div>

	<div class="logo-container">
        <div class="tenor-gif-embed" data-postid="20684011" data-share-method="host" data-aspect-ratio="1.78771" data-width="100%"><a href="https://tenor.com/view/disappointed-the-voice-annoyed-nick-jonas-nbc-gif-20684011">Disappointed The Voice GIF</a>from <a href="https://tenor.com/search/disappointed-gifs">Disappointed GIFs</a></div> <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
    </div>

	<div class="quote-box" id="quote-display">
		Loading
	</div>
	
  </aside>
<main>
    <div class="focus-card">
      <div class="timer-circle">
        <svg>
          <circle class="bg-ring" cx="90" cy="90" r="80"></circle>
          <circle class="progress-ring" id="progress-ring" cx="90" cy="90" r="80"></circle>
        </svg>
        <div class="countdown-display" id="main-timer">00:00:00</div>
      </div>
      <div class="current-task-label" id="current-task">No Active Event</div>
    </div>

    <div class="milestones-row" id="milestones-container">
      </div>
  </main>

  <script src="config.js"></script>
  
  <script src="app.js"></script>
</body>
</html>
