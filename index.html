<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productivity Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <aside>
    <div class="sidebar-section">
      <h2>Schedule</h2>
      <div class="timeline" id="timeline">
        </div>
    </div>

    <div class="quote-box" id="quote-display">
      "Loading daily motivation..."
    </div>

    <div class="logo-container">
      <span>My Logo</span>
    </div>
  </aside>

  <main>
    <div class="focus-card">
      <div class="timer-circle">
        <svg>
          <circle class="bg-ring" cx="90" cy="90" r="80"></circle>
          <circle class="progress-ring" id="progress-ring" cx="90" cy="90" r="80"></circle>
        </svg>
        <div class="countdown-display" id="main-timer">00:00:00</div>
      </div>
      <div class="current-task-label" id="current-task">No Active Event</div>
    </div>

    <div class="milestones-row" id="milestones-container">
      </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
